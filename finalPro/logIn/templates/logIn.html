{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Log in</title>
  <link rel="stylesheet" href="{% static 'styles.css' %}">
  <link rel="stylesheet" href="{% static 'logIn.css' %}">
</head>
<body>
   <header>
          <h1>Sign up</h1>
   </header>
   <form method="post" action="{% url 'logIn' %}" class="logIn-form"> <!--creating a form-->
        {% csrf_token %}
        <div class="form-group">
            <label for="username or email"> Username or Email:</label>
            {{ form.usernameemail }}
        </div>
        <div class="form-group">
            <label for="password1">Password:</label>
            {{ form.password }}
        </div>
        <button type="log in">Log in</button>
   </form>

</body>
</html>
